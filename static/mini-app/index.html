/* ══════ SVG STACKED AREA ══════ */
function SvgStacked(props){
  var data=props.data,keys=props.keys;
  if(!data||data.length<2)return CE("div",{style:{color:T.t3,fontSize:11,textAlign:"center",padding:8}},"데이터 수집 중...");
  var W=320,H=130,pad={t:6,r:8,b:22,l:38},cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;
  var xMin=data[0].day,xMax=data[data.length-1].day||1,yMax=0;
  data.forEach(function(d){var sum=0;keys.forEach(function(k){sum+=(d[k[0]]||0);});yMax=Math.max(yMax,sum,d.ctl||0);});
  yMax=Math.max(yMax*1.15,10);
  var sx=function(d){return pad.l+((d-xMin)/(xMax-xMin||1))*cw;};
  var sy=function(v){return pad.t+(1-v/(yMax||1))*ch;};
  var cumArr=data.map(function(){return 0;});var areas=[];
  keys.forEach(function(kc){var k=kc[0],c=kc[1];var pts=data.map(function(d,i){var prev=cumArr[i];var cur=prev+(d[k]||0);cumArr[i]=cur;return{x:sx(d.day),y0:sy(prev),y1:sy(cur)};});var path="M"+pts[0].x.toFixed(1)+","+pts[0].y1.toFixed(1);for(var i=1;i<pts.length;i++)path+="L"+pts[i].x.toFixed(1)+","+pts[i].y1.toFixed(1);for(var i=pts.length-1;i>=0;i--)path+="L"+pts[i].x.toFixed(1)+","+pts[i].y0.toFixed(1);path+="Z";areas.push({path:path,color:c.color});});
  var ctlPath=data.map(function(d,i){return(i===0?"M":"L")+sx(d.day).toFixed(1)+","+sy(d.ctl||0).toFixed(1);}).join("");
  var yTicks=[];for(var i=0;i<=3;i++)yTicks.push(Math.round(yMax/3*i));
  return(
    <svg width="100%" height="100%" viewBox={"0 0 "+W+" "+H} preserveAspectRatio="xMidYMid meet" style={{display:"block"}}>
      {yTicks.map(function(v,i){return <g key={i}><text x={pad.l-4} y={sy(v)} fill={T.t3} fontSize={10} fontFamily={mono} textAnchor="end" dominantBaseline="middle">{v}</text><line x1={pad.l} y1={sy(v)} x2={pad.l+cw} y2={sy(v)} stroke="rgba(255,255,255,0.05)" strokeWidth={0.5}/></g>;})}
      <line x1={pad.l} y1={pad.t+ch} x2={pad.l+cw} y2={pad.t+ch} stroke={T.border} strokeWidth={0.5}/>
      {[xMin,Math.round((xMin+xMax)/2),xMax].map(function(d,i){return <text key={i} x={sx(d)} y={H-3} fill={T.t3} fontSize={10} fontFamily={mono} textAnchor="middle">{"D"+d}</text>;})}
      {areas.map(function(a,i){return <path key={i} d={a.path} fill={a.color} fillOpacity={0.4} stroke={a.color} strokeWidth={0.8}/>;})}
      <path d={ctlPath} fill="none" stroke={T.t3} strokeWidth={1.2} strokeDasharray="4 3"/>
    </svg>
  );
}

/* ══════ L4: 소셜 채널 ══════ */
function L4(){
  var ctx=useApp(),s=ctx.state,d=ctx.dispatch;
  var chs=Object.entries(SOC).map(function(entry){var k=entry[0],v=entry[1];return{k:k,ic:v.ic,lb:v.lb,val:Math.round(lerp(v.k,s.currentDay))};});
  var tot=chs.reduce(function(sum,c){return sum+c.val;},0);
  return(
    <Panel id="panel-L4" color={T.L.L4} label={"📱 소셜 채널"} delay={0.2}
      badge={<span style={{fontFamily:mono,color:T.t2,fontSize:10}}>{"총 "+fN(tot)}</span>}
      onClick={function(){d({type:"OPEN_MODAL",payload:{type:"L4"}});}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4,flex:1,alignContent:"center"}}>
        {chs.map(function(c){return <div key={c.k} style={{display:"flex",alignItems:"center",gap:6,padding:"5px 8px",borderRadius:6,background:T.card,border:"1px solid "+T.border}}>
          <div style={{width:24,height:24,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,borderRadius:4,background:"rgba(255,255,255,0.04)"}}>{c.ic}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontFamily:mono,fontSize:11,fontWeight:700,color:T.t1}}>{fN(c.val)}</div>
            <div style={{fontSize:8,color:T.t3}}>{c.lb}</div>
          </div>
        </div>;})}
      </div>
    </Panel>
  );
}

function L7(){

    for(var dd=0;dd<=maxD;dd+=step){var pt={day:dd,ctl:Math.round(lerp(REV_CTL,dd))};REV_KEYS.forEach(function(kc){pt[kc[0]]=dd>=kc[1].start?Math.round(lerp(kc[1].k,dd)):0;});pts.push(pt);}
    if(pts.length&&pts[pts.length-1].day!==maxD){var pt2={day:maxD,ctl:Math.round(lerp(REV_CTL,maxD))};REV_KEYS.forEach(function(kc){pt2[kc[0]]=maxD>=kc[1].start?Math.round(lerp(kc[1].k,maxD)):0;});pts.push(pt2);}

        </div>
      </div>
      <div style={{flex:1,minHeight:0}}><SvgStacked data={data} keys={REV_KEYS}/></div>
      {activeRevs.length>0&&<div style={{display:"flex",gap:3,flexShrink:0,marginTop:3}}>
        {activeRevs.map(function(kc){var v=Math.round(lerp(kc[1].k,s.currentDay));return <div key={kc[0]} style={{flex:1,padding:"3px 3px",borderRadius:6,background:kc[1].color+"06",border:"1px solid "+kc[1].color+"15",textAlign:"center"}}>

        </div>;})}
      </div>}
    </Panel>
  );
}

/* ══════ CONNECTION VIEW — opaque overlay with panel-aligned boxes ══════ */
var PANEL_META={
  L2:{color:T.L.L2,name:"앱 스토어",icon:"📱"},
  L1:{color:T.L.L1,name:"런칭된 앱",icon:"📱"},

  L5L6:{color:T.L.L5,name:"고객 여정 / 생태계",icon:"🗺"},
  L7:{color:T.L.L7,name:"수익 모델",icon:"💰"}
};
/* Panel boxes with inset padding (12px smaller on each side from actual panels) */
var P=12;
var CB={
  L2:   {x:14+P, y:10+P, w:208-P*2, h:536-P*2},
  L1:   {x:232+P, y:10+P, w:200-P*2, h:170-P*2},
  L4:   {x:440+P, y:10+P, w:200-P*2, h:170-P*2},
  Ctrl: {x:648+P, y:10+P, w:338-P*2, h:218-P*2},
  L5L6: {x:232+P, y:188+P, w:408-P*2, h:358-P*2},
  L7:   {x:648+P, y:236+P, w:338-P*2, h:310-P*2}
};
/* Edge helper: get a point on edge of box, inset 18px from boundary */
function edgePt(boxKey,side,offset){
  var b=CB[boxKey];var ins=18;var off=offset||0.5;
  if(side==="left")  return {x:b.x+ins, y:b.y+b.h*off};
  if(side==="right") return {x:b.x+b.w-ins, y:b.y+b.h*off};
  if(side==="top")   return {x:b.x+b.w*off, y:b.y+ins};
  if(side==="bottom")return {x:b.x+b.w*off, y:b.y+b.h-ins};
  return {x:b.x+b.w/2,y:b.y+b.h/2};
}
/* Arrow definitions with edge-aware endpoints for correct arrowhead direction */
var CONN_ARROWS=[
  {id:"ar-01",color:T.balance,minDay:30,desc:"앱 런칭 → 스토어 등록",
    s:{box:"L1",side:"left",off:0.5},e:{box:"L2",side:"right",off:0.18},
    lbl:{x:250,y:55,anchor:"start"}},
  {id:"ar-02",color:T.expansion,minDay:1,desc:"앱 런칭 → 소셜 알림",
    s:{box:"L1",side:"right",off:0.35},e:{box:"L4",side:"left",off:0.35},
    lbl:{x:410,y:45,anchor:"middle"}},
  {id:"ar-03",color:T.expansion,minDay:7,desc:"소셜 유입 → 고객 여정",
    s:{box:"L4",side:"bottom",off:0.65},e:{box:"L5L6",side:"top",off:0.55},
    lbl:{x:530,y:185,anchor:"start"}},
  {id:"ar-04",color:T.accent,minDay:30,desc:"앱 사용 → 여정 진행",
    s:{box:"L1",side:"bottom",off:0.4},e:{box:"L5L6",side:"top",off:0.2},
    lbl:{x:258,y:185,anchor:"start"}},
  {id:"ar-05",color:T.balance,minDay:45,desc:"유저 탐색 → 앱 발견",
    s:{box:"L5L6",side:"top",off:0.08},e:{box:"L1",side:"bottom",off:0.7},
    lbl:{x:295,y:160,anchor:"start"}},
  {id:"ar-06",color:T.core,minDay:120,desc:"생태계 성장 → 수익 창출",
    s:{box:"L5L6",side:"right",off:0.4},e:{box:"L7",side:"left",off:0.35},
    lbl:{x:636,y:345,anchor:"middle"}},
  {id:"ar-07",color:T.core,minDay:70,desc:"고객 활성 → 앱 확장",
    s:{box:"L5L6",side:"left",off:0.5},e:{box:"L2",side:"right",off:0.55},
    lbl:{x:250,y:385,anchor:"start"}},
  {id:"ar-08",color:"#A78BFA",minDay:100,desc:"수익 재투자 → 앱 추가",
    s:{box:"L7",side:"top",off:0.7},e:{box:"L1",side:"right",off:0.7},
    lbl:{x:680,y:125,anchor:"start"}}
];
/* Direction vectors for each edge side */
var EDGE_DIR={left:{x:-1,y:0},right:{x:1,y:0},top:{x:0,y:-1},bottom:{x:0,y:1}};
function connPath(ca){
  var a=edgePt(ca.s.box,ca.s.side,ca.s.off);
  var b=edgePt(ca.e.box,ca.e.side,ca.e.off);
  var ds=EDGE_DIR[ca.s.side],de=EDGE_DIR[ca.e.side];
  var dx=b.x-a.x,dy=b.y-a.y;
  var dist=Math.sqrt(dx*dx+dy*dy);
  var pull=Math.max(40,dist*0.35);
  /* Control point 1: leaves p1 in the direction of its edge outward */
  var cx1=a.x+ds.x*pull, cy1=a.y+ds.y*pull;
  /* Control point 2: approaches p2 FROM the direction of its edge outward (so arrow points inward) */
  var cx2=b.x+de.x*pull, cy2=b.y+de.y*pull;
  return {a:a,b:b,d:"M"+a.x+","+a.y+" C"+cx1+","+cy1+" "+cx2+","+cy2+" "+b.x+","+b.y};
}
function ConnectionView(){

        </defs>
        {/* Panel boxes — much more opaque */}
        {boxOrder.map(function(ly){var r=CB[ly];var mt=PANEL_META[ly];
          return <g key={ly}>
            <rect x={r.x} y={r.y} width={r.w} height={r.h} rx="8" ry="8" fill={mt.color+"18"} stroke={mt.color+"60"} strokeWidth="1.8"/>
            <rect x={r.x+1} y={r.y+1} width={r.w-2} height={r.h-2} rx="7" ry="7" fill="rgba(18,18,36,0.75)" stroke="none"/>
            <text x={r.x+r.w/2} y={r.y+r.h/2-5} fill={mt.color} fontSize="11" fontWeight="700" textAnchor="middle" fontFamily={mono} opacity="0.9">{mt.icon+" "+mt.name}</text>
            <text x={r.x+r.w/2} y={r.y+r.h/2+10} fill={mt.color} fontSize="8" textAnchor="middle" fontFamily={mono} opacity="0.4">{ly==="Ctrl"?"CTRL":ly==="L5L6"?"L5·L6":ly}</text>
          </g>;
        })}
        {/* Arrow paths — edge-aware beziers with correct arrowhead direction */}
        {CONN_ARROWS.map(function(ca){var active=!!activeIds[ca.id];
          var cp=connPath(ca);
          return <path key={"cp-"+ca.id} d={cp.d} fill="none" stroke={ca.color} strokeWidth={active?2.5:1} strokeDasharray={active?"none":"6 4"} markerEnd={"url(#mk-"+ca.id+")"} opacity={active?0.85:0.1} strokeLinecap="round"/>;
        })}
        {/* Arrow labels — explicitly positioned, no overlaps */}
        {CONN_ARROWS.map(function(ca){var active=!!activeIds[ca.id];
          if(!active)return null;
          var lx=ca.lbl.x,ly2=ca.lbl.y;
          var tw=ca.desc.length*5.5+16;

          </g>;

        {/* Close hint */}
        <rect x={936} y={10} width={52} height={22} rx="6" fill="rgba(16,20,40,0.9)" stroke={T.border} strokeWidth="1"/>
        <text x={962} y={24} fill={T.t2} fontSize="9" textAnchor="middle" fontFamily={mono}>{"✕ ESC"}</text>
      </svg>
    </div>
  );

          {lk&&<div style={{color:T.t2,fontSize:12,lineHeight:1.7}}>{"상세 보기를 준비 중입니다. (D+"+s.currentDay+")"}</div>}
        </div>
      </div>
    </div>
  );
}

/* ══════ LAYOUT — 125% zoom optimized ══════ */
function Layout(){
  var wide=useApp().wide;
  if(!wide)return(
    <div id="layout-container" style={{flex:1,display:"flex",flexDirection:"column",gap:G,padding:G,overflow:"auto",position:"relative"}}>
      <ConnectionView/>
      <div style={{height:300,flexShrink:0}}><L2/></div>
      <div style={{display:"flex",gap:G,height:220,flexShrink:0}}><div style={{flex:1}}><L1/></div><div style={{flex:1}}><L4/></div></div>
      <div style={{height:180,flexShrink:0}}><CtrlPanel/></div>
      <div style={{height:300,flexShrink:0}}><L5L6/></div>
      <div style={{height:240,flexShrink:0}}><L7/></div>
    </div>
  );
  /* ── Desktop: L2 left, center stack, right column ── */
  return(
    <div id="layout-container" style={{flex:1,display:"flex",gap:G,padding:"6px 12px 10px",overflow:"hidden",position:"relative",minHeight:0}}>
      <ConnectionView/>
      {/* LEFT: L2 App Store — narrower */}
      <div style={{width:"22%",minWidth:200,flexShrink:0,display:"flex"}}><L2/></div>
      {/* CENTER: stacked layers */}
      <div style={{flex:1,display:"flex",flexDirection:"column",gap:G,minHeight:0,minWidth:0}}>
        <div style={{flex:3,display:"flex",gap:G,minHeight:0}}>
          <div style={{flex:5,display:"flex"}}><L1/></div>
          <div style={{flex:5,display:"flex"}}><L4/></div>
        </div>
        <div style={{flex:5,display:"flex",minHeight:0}}>
          <div style={{flex:1,display:"flex"}}><L5L6/></div>
        </div>
      </div>
      {/* RIGHT COLUMN: CtrlPanel + L7 — wider */}
      <div style={{width:280,flexShrink:0,display:"flex",flexDirection:"column",gap:G,minHeight:0}}>
        <div style={{flex:4,display:"flex"}}><CtrlPanel/></div>
        <div style={{flex:6,display:"flex"}}><L7/></div>
      </div>
    </div>
  );
}

/* ══════ CONTROLLERS ══════ */
function Keys(){
  var ctx=useApp(),s=ctx.state,d=ctx.dispatch;
  useEffect(function(){
    function h(e){
      if(e.target.tagName==="INPUT")return;
      switch(e.code){
        case "Space":e.preventDefault();d({type:"TOGGLE_PLAY"});break;
        case "ArrowLeft":e.preventDefault();d({type:"SET_DAY",payload:s.currentDay-(e.shiftKey?10:1)});break;
        case "ArrowRight":e.preventDefault();d({type:"SET_DAY",payload:s.currentDay+(e.shiftKey?10:1)});break;
        case "Digit1":case "Numpad1":d({type:"SET_DAY",payload:0});break;
        case "Digit2":case "Numpad2":d({type:"SET_DAY",payload:1});break;
        case "Digit3":case "Numpad3":d({type:"SET_DAY",payload:30});break;
        case "Digit4":case "Numpad4":d({type:"SET_DAY",payload:90});break;
        case "Digit5":case "Numpad5":d({type:"SET_DAY",payload:180});break;
        case "Escape":d({type:"CLOSE_MODAL"});break;
        case "KeyC":d({type:"TOGGLE_CONNECTIONS"});break;
      }
    }
    window.addEventListener("keydown",h);return function(){window.removeEventListener("keydown",h);};
  },[s.currentDay,s.playbackSpeed,s.isPlaying]);
  return null;
}
function AutoPlay(){
  var ctx=useApp(),s=ctx.state,d=ctx.dispatch;var pt=useRef(null);
  useEffect(function(){
    if(!s.isPlaying)return;
    var t=setInterval(function(){d({type:"SET_DAY",payload:s.currentDay+1});},1000/s.playbackSpeed);
    return function(){clearInterval(t);};
  },[s.isPlaying,s.playbackSpeed,s.currentDay]);
  useEffect(function(){
    if(s.isPlaying&&EV_DAYS.has(s.currentDay)&&!s.eventPaused){
      d({type:"SET_PLAYING",payload:false});d({type:"SET_EVENT_PAUSED",payload:true});
      pt.current=setTimeout(function(){d({type:"SET_EVENT_PAUSED",payload:false});d({type:"SET_PLAYING",payload:true});},1500);
    }
    return function(){if(pt.current)clearTimeout(pt.current);};
  },[s.currentDay]);
  useEffect(function(){if(s.currentDay>=240&&s.isPlaying)d({type:"SET_PLAYING",payload:false});},[s.currentDay,s.isPlaying]);
  return null;
}

/* ══════ ROOT ══════ */
function App(){
  var _s=useReducer(reducer,init),state=_s[0],dispatch=_s[1];
  var _w=useState(window.innerWidth>=1176),wide=_w[0],setWide=_w[1];
  useEffect(function(){function c(){setWide(window.innerWidth>=1176);}window.addEventListener("resize",c);return function(){window.removeEventListener("resize",c);};},[]);
  return(
    <Ctx.Provider value={{state:state,dispatch:dispatch,wide:wide}}>
      <div style={{width:"calc(100vw / 1.4)",height:"calc(100vh / 1.4)",transform:"scale(1.4)",transformOrigin:"0 0",background:T.bg,color:T.t1,display:"flex",flexDirection:"column",overflow:"hidden",position:"relative",zIndex:1}}>
        <div style={{position:"absolute",top:"-50%",left:"-50%",width:"200%",height:"200%",background:"radial-gradient(ellipse at 30% 20%,rgba(233,69,96,0.03),transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(78,205,196,0.03),transparent 50%)",animation:"bgRotate 40s linear infinite",pointerEvents:"none",zIndex:0}}/>
        <Header/><Layout/><DetailModal/><Keys/><AutoPlay/>
      </div>
    </Ctx.Provider>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(CE(App));
