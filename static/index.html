<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tamaverse</title>
<!-- GA4 -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-JM5QR63VMC"></script>
<script>
window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}
gtag('js',new Date());gtag('config','G-JM5QR63VMC');
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:#1a1a2e;font-family:'Noto Sans KR','Segoe UI',system-ui,sans-serif;color:#f5f5f5;display:flex;align-items:center;justify-content:center}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(78,205,196,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(78,205,196,.015) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}
.container{text-align:center;padding:2rem;position:relative;z-index:1}
.emoji{font-size:3rem;margin-bottom:1rem;animation:float 3s ease-in-out infinite}
h1{font-size:2.8rem;margin-bottom:0.5rem;background:linear-gradient(135deg,#4ecdc4,#7B61FF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:700;letter-spacing:-0.02em}
.tagline{color:#b0b8c8;margin-bottom:2.5rem;font-size:1.05rem;font-weight:300}
.links{display:flex;flex-direction:column;gap:0.75rem;align-items:center}
a{display:flex;align-items:center;gap:0.75rem;padding:0.9rem 2rem;width:280px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:14px;color:#f5f5f5;text-decoration:none;font-size:1rem;transition:all 0.25s;justify-content:center}
a:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.18);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.3)}
a .icon{font-size:1.2rem}
a .label{font-weight:500}
a .badge{font-size:0.7rem;padding:2px 8px;border-radius:20px;font-weight:500}
.tamaverse-link{border-color:rgba(233,69,96,0.2)}
.tamaverse-link:hover{border-color:rgba(233,69,96,0.4);background:rgba(233,69,96,0.08)}
.tamaverse-link .badge{background:rgba(233,69,96,0.15);color:#e94560}
.mini-link{border-color:rgba(78,205,196,0.2)}
.mini-link:hover{border-color:rgba(78,205,196,0.4);background:rgba(78,205,196,0.08)}
.mini-link .badge{background:rgba(78,205,196,0.15);color:#4ecdc4}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
</style>
</head>
<body>
<div class="container">
  <div class="emoji">&#x1F30C;</div>
  <h1>Tamaverse</h1>
  <p class="tagline">Coming soon</p>
  <div class="links">
    <a href="/hotel" class="tamaverse-link" onclick="gtag('event','click_tamaverse',{event_category:'navigation',event_label:'landing_to_tamaverse'})">
      <span class="icon">&#x1F3E8;</span>
      <span class="label">Tamaverse</span>
      <span class="badge">NEW</span>
    </a>
    <a href="/mini-app" class="mini-link" onclick="gtag('event','click_miniapp',{event_category:'navigation',event_label:'landing_to_miniapp'})">
      <span class="icon">&#x1F4F1;</span>
      <span class="label">Mini App Simulator</span>
    </a>
  </div>
</div>
<script>
// 체류시간 이벤트: 30초, 60초, 180초
[30,60,180].forEach(function(s){
  setTimeout(function(){gtag('event','engaged_time',{event_category:'engagement',value:s,event_label:s+'s_on_landing'});},s*1000);
});
</script>
</body>
</html>
